
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Wizard Tower Stage Reference (Fixed)</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#222}
#info{position:absolute;left:10px;top:10px;color:#fff;background:#0008;padding:8px;font-family:Arial}
</style>

<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">Three.js stage reference (fixed)</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x2b2d33);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
camera.position.set(0,18,13);
camera.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0,0);
controls.enableDamping=true;
controls.maxPolarAngle=Math.PI*0.45;
controls.minDistance=8;
controls.maxDistance=35;

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.5));

const dir=new THREE.DirectionalLight(0xffffff,2);
dir.position.set(10,20,10);
scene.add(dir);

const board=new THREE.Mesh(
 new THREE.CylinderGeometry(12,12,0.8,64),
 new THREE.MeshStandardMaterial({color:0x6d7b55})
);
scene.add(board);

const radius=8;
const pts=[];
for(let i=0;i<16;i++){
 const a=i*Math.PI*2/16;
 const x=Math.cos(a)*radius;
 const z=Math.sin(a)*radius;
 pts.push({x,z});

 const p=new THREE.Mesh(
   new THREE.CylinderGeometry(.35,.35,.08,24),
   new THREE.MeshStandardMaterial({color:0xd8c08b})
 );
 p.position.set(x,.45,z);
 scene.add(p);
}

function tower(i){
 const g=new THREE.Group();
 const body=new THREE.Mesh(
   new THREE.CylinderGeometry(.55,.7,2.3,8),
   new THREE.MeshStandardMaterial({color:0x666666})
 );
 body.position.y=1.15;
 g.add(body);

 const roof=new THREE.Mesh(
   new THREE.ConeGeometry(.7,.8,8),
   new THREE.MeshStandardMaterial({color:0x884444})
 );
 roof.position.y=2.7;
 g.add(roof);

 g.position.set(pts[i].x,0,pts[i].z);
 scene.add(g);
}

[1,4,7,10,13].forEach(tower);

const castle=new THREE.Mesh(
 new THREE.BoxGeometry(2,2,2),
 new THREE.MeshStandardMaterial({color:0x333344})
);
castle.position.set(0,1,0);
scene.add(castle);

function wizard(i,color){
 const g=new THREE.Group();
 const cone=new THREE.Mesh(
   new THREE.ConeGeometry(.2,.6,8),
   new THREE.MeshStandardMaterial({color})
 );
 cone.position.y=.5;
 g.add(cone);

 const head=new THREE.Mesh(
   new THREE.SphereGeometry(.1,16,16),
   new THREE.MeshStandardMaterial({color:0xffddbb})
 );
 head.position.y=.8;
 g.add(head);

 g.position.set(pts[i].x,0,pts[i].z);
 scene.add(g);
}
wizard(2,0x3366ff);
wizard(8,0xcc3333);
wizard(12,0x33aa55);

addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

renderer.setAnimationLoop(()=>{
 controls.update();
 renderer.render(scene,camera);
});
</script>
</body>
</html>
